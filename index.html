<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte produit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <header>
        <h1>Ma carte produit</h1>

    <main>
        <section class="carte">
            <div class="image">
                <img src="casque_noir.png" alt="casque noir">
            </div>
            <div class="contenu">
                <h2>Casque sans fil pro</h2>
                <p>Profitez d'un son immersif et d'un confort optimal pour vos sessions de jeu et d'écoute.</p>
                  <span>2 500 CFA</span>

    </main>
